            color: #ececec;
        }

        /* Partículas de fundo animadas */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            background: radial-gradient(circle at 20% 30%, #1a1a2e, #0a0a0a);
        }

        .particle {
            position: absolute;
            background: rgba(212, 175, 55, 0.15);
            border-radius: 50%;
            animation: float 20s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0.3; }
            50% { transform: translateY(-100px) translateX(50px); opacity: 0.8; }
        }

        /* Header majestoso */
        .hero {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 120px 20px 80px;
            background: linear-gradient(135deg, rgba(0,0,0,0.8) 0%, rgba(26,26,46,0.9) 100%);
            backdrop-filter: blur(2px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            margin-bottom: 60px;
        }

        .hero h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 5rem;
            font-weight: 600;
            background: linear-gradient(135deg, #e8d5b7 0%, #c9a96e 40%, #f5e6c8 70%, #c9a96e 100%);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: goldenShine 6s ease infinite;
            letter-spacing: -0.02em;
        }

        @keyframes goldenShine {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .hero .subtitle {
            font-size: 1.3rem;
            color: rgba(236, 236, 236, 0.7);
            max-width: 700px;
            margin: 25px auto 0;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: rgba(212, 175, 55, 0.15);
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 60px;
            padding: 12px 28px;
            margin-top: 35px;
            backdrop-filter: blur(10px);
        }

        .badge i {
            color: #c9a96e;
            font-size: 1.3rem;
        }

        .badge span {
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 2px;
        }

        .badge .count-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: #c9a96e;
            margin-right: 5px;
        }

        /* Filtros */
        .filter-section {
            position: relative;
            z-index: 2;
            text-align: center;
            margin-bottom: 50px;
            padding: 0 20px;
        }

        .filter-btn {
            background: rgba(20, 20, 30, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            color: #ccc;
            padding: 12px 28px;
            margin: 6px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            font-family: 'Montserrat', sans-serif;
        }

        .filter-btn i {
            margin-right: 8px;
        }

        .filter-btn:hover {
            border-color: #c9a96e;
            color: #c9a96e;
            transform: translateY(-3px);
            background: rgba(30, 30, 45, 0.9);
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #c9a96e, #b8924a);
            color: #0a0a0a;
            border-color: transparent;
            box-shadow: 0 8px 20px rgba(201, 169, 110, 0.3);
        }

        /* Container */
        .container {
            position: relative;
            z-index: 2;
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 30px 80px;
        }

        /* Grid de cards */
        .quote-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 35px;
        }

        /* Card individual - design luxuoso */

            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 35px 30px;
            transition: all 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.2);
            border: 1px solid rgba(212, 175, 55, 0.15);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .quote-card::before {
            content: '"';
            position: absolute;
            top: 20px;
            left: 25px;
            font-size: 6rem;
            font-family: 'Cormorant Garamond', serif;
            color: rgba(212, 175, 55, 0.08);
            pointer-events: none;
            font-weight: 700;
        }

        .quote-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.05), transparent);
            transition: left 0.6s ease;
        }

        .quote-card:hover::after {
            left: 100%;
        }

        .quote-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(212, 175, 55, 0.5);
            background: linear-gradient(135deg, rgba(35, 35, 55, 0.85) 0%, rgba(20, 20, 35, 0.9) 100%);

            line-height: 1.65;
            font-weight: 400;
            font-family: 'Cormorant Garamond', serif;
            text-align: center;
            margin-bottom: 25px;
            position: relative;
            z-index: 2;
            color: #f5f0e8;
            letter-spacing: 0.3px;
        }

        .quote-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            border-top: 1px solid rgba(212, 175, 55, 0.15);
            padding-top: 18px;
        }

        .quote-topic {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            font-weight: 500;
            padding: 5px 14px;
            border-radius: 30px;
            background: rgba(212, 175, 55, 0.12);
            color: #d4af37;

            color: rgba(255,255,255,0.3);

        .floating-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 100;
            display: flex;
            gap: 15px;

            color: #0a0a0a;
            cursor: pointer;
            font-size: 1.3rem;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

            transform: scale(1.1);
            background: #d4af37;

            z-index: 2;
            text-align: center;
            padding: 50px;
            border-top: 1px solid rgba(212, 175, 55, 0.15);
            margin-top: 60px;
            color: rgba(255,255,255,0.3);
            font-size: 0.8rem;
            background: rgba(0,0,0,0.4);

        /* Responsivo */
        @media (max-width: 768px) {
            .hero h1 { font-size: 2.8rem; }
            .quote-grid { grid-template-columns: 1fr; gap: 20px; }
            .quote-card { padding: 25px; }
            .filter-btn { padding: 8px 16px; font-size: 0.75rem; }
            .container { padding: 0 15px 40px; }
        }

        /* Animação de entrada */
        .quote-card {
            animation: fadeInScale 0.7s ease forwards;
            opacity: 0;
            transform: scale(0.95);
        }

        @keyframes fadeInScale {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Scrollbar personalizada */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        ::-webkit-scrollbar-thumb {
            background: #c9a96e;
            border-radius: 10px;
        }
    </style>
</head>

            "Sucesso não é chegar no topo sozinho, é levar outros junto.",
            "A disciplina é a mãe do sucesso.",
            "Sucesso é o que acontece quando a preparação encontra a oportunidade.",
            "Não espere o sucesso cair do céu. Construa o alicerce.",
            "O sucesso é uma escada que não pode ser subida com as mãos nos bolsos.",
            "Sucesso é fazer o que você ama e encontrar alguém que pague por isso.",
            "O fracasso é uma vírgula, não um ponto final.",
            "Sucesso é resiliência em ação.",
            "A consistência vence o talento quando o talento não é consistente.",
            "Sucesso não é um destino, é uma jornada de melhoria contínua.",
            "O sucesso começa onde a zona de conforto termina.",
            "Sucesso é transformar 'um dia' em 'hoje'.",
            "Não há elevador para o sucesso. É preciso subir as escadas.",
            "Sucesso é aprender a cair e levantar com mais sabedoria.",
            "O sucesso silencia os críticos.",
            "Sucesso é quando seus valores e suas ações estão alinhados.",
            "Pequenas vitórias diárias constroem grandes sucessos.",
            "O sucesso é a paz de espírito de saber que deu o seu melhor.",
            "Sucesso é plantar árvores cuja sombra você talvez não sente.",
            "O verdadeiro sucesso é inspirar outras pessoas."
        ]
    };

    // Expandir para atingir 1000+ frases (mínimo 150 por tema)
    function expandirLista(arr, target) {
        let result = [...arr];
        while (result.length < target) {
            for (let i = 0; i < arr.length && result.length < target; i++) {
                let variacao = arr[i];
                if (result.length % 3 === 1 && !variacao.includes("?")) {
                    variacao = variacao.replace(/\.$/, "... e essa é a verdade.");
                } else if (result.length % 5 === 2) {
                    variacao = variacao.replace(/$/, " ✨");
                } else if (result.length % 7 === 3) {
                    variacao = "— " + variacao;
                }
                if (!result.includes(variacao)) {
                    result.push(variacao);
                }
            }
        }
        return result.slice(0, target);
    }

    const TEMAS = ['tempo', 'felicidade', 'coragem', 'leveza', 'amor', 'sucesso'];
    const TARGET_POR_TEMA = 175; // 175 x 6 = 1050 frases

    let todasFrases = [];

    TEMAS.forEach(tema => {
        const base = frasesPorTema[tema] || frasesPorTema.tempo;
        const expandidas = expandirLista(base, TARGET_POR_TEMA);
        expandidas.forEach(texto => {
            todasFrases.push({ texto, topico: tema });
        });
    });

    // Embaralhar para não ficar blocos idênticos
    for (let i = todasFrases.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [todasFrases[i], todasFrases[j]] = [todasFrases[j], todasFrases[i]];
    }

    // Atualizar contador
    document.getElementById('quoteCount').innerText = todasFrases.length;

    const quoteGrid = document.getElementById('quoteGrid');
    let currentFilter = 'all';

    function renderQuotes(filter) {
        quoteGrid.innerHTML = '';
        const filtered = filter === 'all' ? todasFrases : todasFrases.filter(q => q.topico === filter);
        
        filtered.forEach((frase, index) => {
            const card = document.createElement('div');
            card.className = 'quote-card';
            card.setAttribute('data-topic', frase.topico);
            card.style.animationDelay = `${Math.min(index * 0.005, 0.3)}s`;
            
            const nomeTopico = {
                tempo: '⏳ TEMPO & VIDA',
                felicidade: '😊 FELICIDADE',
                coragem: '🦁 CORAGEM & RECOMEÇOS',
                leveza: '🕊️ LEVEZA & DEIXAR IR',
                amor: '💖 AMOR & SENTIMENTOS',
                sucesso: '🏆 SUCESSO & PROPÓSITO'
            }[frase.topico] || '✨ INSPIRAÇÃO';
            
            card.innerHTML = `
                <div class="quote-text">${frase.texto}</div>
                <div class="quote-footer">
                    <div class="quote-topic">${nomeTopico}</div>
                    <div class="quote-number">#${index + 1}</div>
                </div>
            `;
            quoteGrid.appendChild(card);
        });
    }

    renderQuotes('all');

    // Filtros
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.filter;
            renderQuotes(currentFilter);
        });
    });

    // Back to top
    const backBtn = document.getElementById('backToTop');
    window.addEventListener('scroll', () => {
        if (window.scrollY > 300) {
            backBtn.classList.add('show');
        } else {
            backBtn.classList.remove('show');
        }
    });
    backBtn.addEventListener('click', () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // Print PDF
    document.getElementById('printPDF').addEventListener('click', () => {
        window.print();
    });

    // Criar partículas
    for (let i = 0; i < 50; i++) {
        const particle = document.createElement('div');
        particle.classList.add('particle');
        particle.style.width = Math.random() * 6 + 2 + 'px';
        particle.style.height = particle.style.width;
        particle.style.left = Math.random() * 100 + '%';
        particle.style.top = Math.random() * 100 + '%';
        particle.style.animationDuration = Math.random() * 30 + 15 + 's';
        particle.style.animationDelay = Math.random() * 10 + 's';
        document.getElementById('particles').appendChild(particle);
    }

    console.log(`✅ Ebook carregado com ${todasFrases.length} frases`);
</script>
</body>
</html>
